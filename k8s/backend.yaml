apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: sample-app
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::805400277714:role/BackendServiceRole"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: sample-app
type: Opaque
stringData:
  S3_BUCKET_NAME: "sample-app-dev-files-805400277714-kbm"
  DB_USERNAME: "admin"
  DB_PASSWORD: "admin123$"
  DB_URL: "jdbc:mysql://sample-app-mysql.c18y4gs8uo61.ap-northeast-2.rds.amazonaws.com:3306/mydb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: 805400277714.dkr.ecr.ap-northeast-2.amazonaws.com/sample-app-v3/backend
          ports:
            - containerPort: 8080
          env:
            - name: S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: S3_BUCKET_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: sample-app
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
